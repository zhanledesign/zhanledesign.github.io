<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZhanLe Design Studio</title>
    <style>
        /* 全局定义：高级克莱因蓝与简约灰 */
        :root {
            --brand-blue: #002FA7; /* 高级克莱因蓝 */
            --apple-bg: #ffffff;
            --apple-dark: #1d1d1f;
            --apple-gray: #86868b;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body {
            background-color: var(--apple-bg);
            color: var(--apple-dark);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* 悬浮药丸导航栏 */
        .dock-container {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
        }

        .nav-pill {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            padding: 10px 30px;
            border-radius: 100px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            gap: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .nav-pill a {
            text-decoration: none;
            color: var(--apple-dark);
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
            position: relative;
        }

        .nav-pill a:hover {
            color: var(--brand-blue);
        }

        /* 鼠标悬停时的蓝点提示 */
        .nav-pill a:hover::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: var(--brand-blue);
            border-radius: 50%;
        }

        /* Hero 区域 */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: clamp(48px, 10vw, 100px);
            font-weight: 700;
            letter-spacing: -0.04em;
            margin-bottom: 20px;
            background: linear-gradient(180deg, #000 60%, var(--brand-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 20px;
            color: var(--apple-gray);
            max-width: 600px;
        }

        /* 通用部分样式 */
        section {
            padding: 120px 20px;
            max-width: 1200px;
            margin: 0 auto;
            min-height: 80vh;
        }

        h2 {
            font-size: 42px;
            margin-bottom: 60px;
            text-align: center;
        }

        /* 关于我 Section */
        #about {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .about-content { max-width: 700px; }
        .about-content p { font-size: 22px; color: var(--apple-gray); margin-bottom: 20px; }

        /* 作品网格 Section */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
        }

        .card {
            background: #f5f5f7;
            border-radius: 30px;
            height: 500px;
            overflow: hidden;
            position: relative;
            transition: var(--transition);
        }

        .card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(0,0,0,0.1); }
        
        .card-img {
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            transition: var(--transition);
        }

        .card:hover .card-img { scale: 1.05; }

        .card-info {
            position: absolute;
            bottom: 40px; left: 40px;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        /* 联系 Section */
        #contact {
            text-align: center;
            background: var(--brand-blue);
            color: #fff;
            border-radius: 50px;
            margin-bottom: 150px; /* 为 Dock 留出空间 */
        }

        #contact h2 { color: #fff; }
        .contact-btn {
            display: inline-block;
            padding: 20px 50px;
            background: #fff;
            color: var(--brand-blue);
            text-decoration: none;
            border-radius: 100px;
            font-size: 18px;
            font-weight: 600;
            transition: var(--transition);
        }

        .contact-btn:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }

        footer { padding: 40px; text-align: center; color: var(--apple-gray); font-size: 12px; }

        /* 响应式 */
        @media (max-width: 768px) {
            .project-grid { grid-template-columns: 1fr; }
            .hero h1 { font-size: 50px; }
            .nav-pill { gap: 20px; padding: 10px 20px; }
        }
    </style>
</head>
<body>

    <div class="dock-container">
        <nav class="nav-pill">
            <a href="#about">关于我</a>
            <a href="#work">作品展示</a>
            <a href="#contact">联系我</a>
        </nav>
    </div>

    <header class="hero">
        <h1>ZhanLe Design Studio</h1>
        <p>以简约平衡复杂，用设计驱动直觉。</p>
    </header>

    <section id="about">
        <div class="about-content">
            <h2>关于我</h2>
            <p>我是詹乐，一名追求纯粹视觉体验的设计师。</p>
            <p>我坚信设计不应该是装饰，而应该是解决问题的最美路径。</p>
        </div>
    </section>

    <section id="work">
        <h2>作品展示</h2>
        <div class="project-grid">
            <div class="card">
                <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1494438639946-1ebd1d20bf85?auto=format&fit=crop&w=800&q=80');"></div>
                <div class="card-info">
                    <h3>极简主义灯具设计</h3>
                    <p>工业设计 / 2026</p>
                </div>
            </div>
            <div class="card">
                <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=800&q=80');"></div>
                <div class="card-info">
                    <h3>数字交互界面</h3>
                    <p>UI UX / 2026</p>
                </div>
            </div>
        </div>
    </section>

    <section id="contact">
        <h2>准备好开始了吗？</h2>
        <p style="color: rgba(255,255,255,0.8); margin-bottom: 40px;">期待与你的合作。</p>
        <a href="mailto:hello@zhanle.com" class="contact-btn">发送邮件联络</a>
    </section>

    <footer>
        <p>© 2026 ZhanLe Design Studio. All Rights Reserved.</p>
    </footer>

</body>
</html>
