<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZhanLe Design Studio</title>
    <style>
        /* Design System: International Klein Blue & Apple Minimalist */
        :root {
            --brand-blue: #002FA7; 
            --apple-bg: #ffffff;
            --apple-dark: #1d1d1f;
            --apple-gray: #86868b;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body {
            background-color: var(--apple-bg);
            color: var(--apple-dark);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* --- ADVANCED HERO SECTION --- */
        .hero {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            background: #fff;
        }

        /* Fluid Background Animation */
        .hero-bg-accent {
            position: absolute;
            top: -20%;
            right: -10%;
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, rgba(0, 47, 167, 0.08) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            z-index: 0;
            animation: fluidMove 15s infinite alternate ease-in-out;
        }

        @keyframes fluidMove {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-15%, 15%) scale(1.1); }
        }

        .hero-content {
            z-index: 1;
            text-align: center;
            padding: 0 40px;
        }

        /* Mega Typography with Entrance Animation */
        .hero h1 {
            font-size: clamp(56px, 12vw, 140px);
            font-weight: 800;
            letter-spacing: -0.05em;
            line-height: 0.9;
            margin-bottom: 30px;
            color: var(--apple-dark);
            opacity: 0;
            transform: translateY(40px);
            animation: reveal 1.2s forwards cubic-bezier(0.16, 1, 0.3, 1);
        }

        .hero h1 span {
            display: block;
            color: var(--brand-blue);
        }

        .hero p {
            font-size: clamp(18px, 2.5vw, 26px);
            color: var(--apple-gray);
            max-width: 700px;
            margin: 0 auto;
            font-weight: 400;
            opacity: 0;
            transform: translateY(20px);
            animation: reveal 1.2s 0.3s forwards cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes reveal {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Decorative Line */
        .hero::after {
            content: '';
            position: absolute;
            bottom: 120px;
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, var(--brand-blue), transparent);
            animation: scrollLine 2s infinite;
        }

        @keyframes scrollLine {
            0% { transform: scaleY(0); transform-origin: top; }
            50% { transform: scaleY(1); transform-origin: top; }
            51% { transform: scaleY(1); transform-origin: bottom; }
            100% { transform: scaleY(0); transform-origin: bottom; }
        }

        /* --- DOCK NAVIGATION --- */
        .dock-container {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
        }

        .nav-pill {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            padding: 12px 35px;
            border-radius: 100px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            display: flex;
            gap: 45px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
        }

        .nav-pill a {
            text-decoration: none;
            color: var(--apple-dark);
            font-size: 15px;
            font-weight: 500;
            transition: var(--transition);
            position: relative;
        }

        .nav-pill a:hover { color: var(--brand-blue); }

        .nav-pill a:hover::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            background: var(--brand-blue);
            border-radius: 50%;
        }

        /* --- CONTENT SECTIONS --- */
        section {
            padding: 140px 24px;
            max-width: 1300px;
            margin: 0 auto;
            min-height: 90vh;
        }

        h2 {
            font-size: 48px;
            margin-bottom: 80px;
            letter-spacing: -0.02em;
            text-align: center;
        }

        /* About Section */
        #about {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .about-content { max-width: 800px; }
        .about-content p { font-size: clamp(22px, 3vw, 28px); color: var(--apple-gray); margin-bottom: 30px; font-weight: 300; }

        /* Work Section */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
        }

        .card {
            background: #fbfbfd;
            border-radius: 40px;
            height: 600px;
            overflow: hidden;
            position: relative;
            transition: var(--transition);
            cursor: pointer;
        }

        .card:hover { transform: translateY(-15px); box-shadow: 0 40px 80px rgba(0,0,47,0.1); }
        
        .card-img {
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card:hover .card-img { transform: scale(1.1); }

        .card-info {
            position: absolute;
            bottom: 50px; left: 50px;
            color: #fff;
            z-index: 2;
        }

        .card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.4), transparent 50%);
        }

        /* Contact Section */
        #contact {
            text-align: center;
            background: var(--brand-blue);
            color: #fff;
            border-radius: 60px;
            margin-bottom: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #contact h2 { color: #fff; margin-bottom: 30px; }
        .contact-btn {
            display: inline-block;
            margin-top: 40px;
            padding: 24px 64px;
            background: #fff;
            color: var(--brand-blue);
            text-decoration: none;
            border-radius: 100px;
            font-size: 20px;
            font-weight: 600;
            transition: var(--transition);
        }

        .contact-btn:hover { transform: scale(1.05); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }

        footer { padding: 60px 40px; text-align: center; color: var(--apple-gray); font-size: 14px; }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .project-grid { grid-template-columns: 1fr; }
            .hero h1 { font-size: 60px; }
            .nav-pill { gap: 20px; padding: 10px 25px; }
            .card { height: 450px; }
        }
    </style>
</head>
<body>

    <!-- Bottom Pill Navigation -->
    <div class="dock-container">
        <nav class="nav-pill">
            <a href="#about">关于我</a>
            <a href="#work">作品展示</a>
            <a href="#contact">联系我</a>
        </nav>
    </div>

    <!-- Enhanced High-Impact Hero Section -->
    <header class="hero">
        <div class="hero-bg-accent"></div>
        <div class="hero-content">
            <h1>ZhanLe<span>Design Studio</span></h1>
            <p>以简约平衡复杂，用设计驱动直觉。</p>
        </div>
    </header>

    <!-- About Me Section -->
    <section id="about">
        <div class="about-content">
            <h2>关于我</h2>
            <p>我是詹乐，一名追求纯粹视觉体验的设计师。</p>
            <p>我坚信设计不应该是装饰，而应该是解决问题的最美路径。</p>
        </div>
    </section>

    <!-- Work Gallery Section -->
    <section id="work">
        <h2>作品展示</h2>
        <div class="project-grid">
            <div class="card">
                <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1494438639946-1ebd1d20bf85?auto=format&fit=crop&w=1200&q=80');"></div>
                <div class="card-info">
                    <h3>极简主义灯具设计</h3>
                    <p>工业设计 / 2026</p>
                </div>
            </div>
            <div class="card">
                <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=1200&q=80');"></div>
                <div class="card-info">
                    <h3>数字交互界面</h3>
                    <p>UI UX / 2026</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <section id="contact">
        <h2>准备好开始了吗？</h2>
        <p style="color: rgba(255,255,255,0.7); font-size: 22px;">期待与你的合作。</p>
        <div>
            <a href="mailto:hello@zhanle.com" class="contact-btn">发送邮件联络</a>
        </div>
    </section>

    <footer>
        <p>© 2026 ZhanLe Design Studio. All Rights Reserved.</p>
    </footer>

</body>
</html>
