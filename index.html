<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>显示地图示例</title>
    <style>
        /* 弹窗背景（遮罩层） */
        .modal {
            display: none; /* 默认隐藏 */
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7); /* 半透明黑 */
        }

        /* 弹窗内容 */
        .modal-content {
            position: relative;
            margin: 10% auto;
            padding: 20px;
            width: 80%;
            max-width: 600px;
            background-color: #fff;
            text-align: center;
            border-radius: 8px;
        }

        /* 图片样式 */
        .modal-content img {
            width: 100%;
            height: auto;
        }

        /* 关闭按钮 */
        .close-btn {
            position: absolute;
            right: 15px;
            top: 10px;
            font-size: 24px;
            cursor: pointer;
            color: #333;
        }

        /* 触发按钮样式 */
        .show-map-btn {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <button class="show-map-btn" onclick="openModal()">显示地图</button>

    <div id="mapModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3>交通位置图</h3>
            <img src="https://i.postimg.cc/MG3fh5Lz/jiao-tong-wei-zhi1.gif" alt="地图">
        </div>
    </div>

    <script>
        // 打开弹窗
        function openModal() {
            document.getElementById('mapModal').style.display = "block";
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('mapModal').style.display = "none";
        }

        // 点击弹窗外部也可以关闭
        window.onclick = function(event) {
            var modal = document.getElementById('mapModal');
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>

</body>
</html>
